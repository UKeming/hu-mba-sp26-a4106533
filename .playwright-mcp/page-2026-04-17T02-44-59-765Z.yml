                        - generic [ref=e349]:
                          - paragraph [ref=e350]: You are the top advisor to your country’s president. Citizens have voiced growing concerns about the loss of privacy in today’s technology-driven society. They feel increasingly monitored—through cameras, phone usage, and online activity—and believe this erosion of privacy is affecting their quality of life.
                          - paragraph [ref=e351]:
                            - text: With a presidential election approaching in six months, the president plans to release a policy paper titled
                            - emphasis [ref=e352]: “The Rights of Our Citizens.”
                            - text: This policy will address privacy related to financial, health, and other personal data. However, it must also ensure that businesses can continue to access consumer data needed to understand purchasing behavior and sustain economic growth. The policy must therefore strike a careful balance between individual privacy and business needs.
                          - paragraph [ref=e353]:
                            - text: As the top advisor, you are required to write a
                            - strong [ref=e354]: 2-3 page
                            - text: "policy paper that addresses the following:"
                          - list [ref=e355]:
                            - listitem [ref=e356]: "Issue background: Overview of the current privacy landscape"
                            - listitem [ref=e357]: "Impact on citizens: How the perceived loss of data privacy affects individuals"
                            - listitem [ref=e358]: "Impact on business: Why access to personal data is important for businesses"
                            - listitem [ref=e359]: "Rights of citizens: Define consumer rights related to data privacy"
                            - listitem [ref=e360]: "Rights of businesses: Define consumer rights related to data privacy"
                            - listitem [ref=e361]: "Proposed law: Recommend a balanced policy that protects sensitive data while allowing appropriate data use to support business and economic growth"
                          - paragraph [ref=e362]: "Your paper should meet the following structural requirements:"
                          - list [ref=e363]:
                            - listitem [ref=e364]: 2-3 pages in length (excluding the title and reference pages)
                            - listitem [ref=e365]:
                              - text: Support your statements with
                              - strong [ref=e366]: in-text
                              - text: citations from a minimum of 2 scholarly articles from class readings, textbook, or lectures
