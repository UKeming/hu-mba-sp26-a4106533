                          - generic [ref=e220]:
                            - paragraph [ref=e221]:
                              - strong [ref=e222]: USE OF GENERATIVE ARTIFICIAL INTELLIGENCE (GENAI) TOOLS
                            - paragraph [ref=e223]: Humphreys University recognizes that generative artificial intelligence (GenAI) tools can enhance innovation, productivity, and learning. However, the use of such tools must uphold academic integrity, intellectual property rights, and ethical standards. All members of the University community are expected to engage with AI technologies in ways that demonstrate honesty, accountability, and respect for privacy and ownership.
                            - paragraph [ref=e224]:
                              - strong [ref=e225]: "Prohibited Uses of AI:"
                              - text: The following actions are expressly prohibited and constitute a violation of university policy.
                            - list [ref=e226]:
                              - listitem [ref=e227]: Entering or uploading any university-produced materials—including syllabi, instructor guides, assessment questions, templates, or feedback—into GenAI systems.
                              - listitem [ref=e228]:
                                - text: Using GenAI tools to complete quizzes, examinations, or other summative assessments unless explicitly authorized.
                                - list [ref=e229]:
                                  - listitem [ref=e230]: "Note: In MBA392, your summative assessments are Papers #1 and #2. Therefore, AI cannot be used."
                              - listitem [ref=e231]: Inputting or sharing confidential information, including student records, grades, peer feedback, or faculty materials.
                              - listitem [ref=e232]: Submitting unedited or uncited AI-generated content as one’s own original work.
                            - paragraph
                            - paragraph [ref=e233]:
                              - strong [ref=e234]: Business Department Policy – Allowed
                            - paragraph [ref=e235]: "Other than the above expressly prohibited uses, GenAI tools may be used in this course as long as students do so honestly through proper documentation, citation, and acknowledgement. To demonstrate honest use of these tools and the learning process, students must:"
                            - list [ref=e236]:
                              - listitem [ref=e237]: Keep histories of GenAI chats and submit them when requested.
                              - listitem [ref=e238]: Any use of AI tools must be properly cited. Citation formats will be specified by the instructor.
                              - listitem [ref=e239]: Verify the accuracy and authenticity of GenAI information by consulting credible, original sources.
                            - paragraph
                            - paragraph [ref=e240]: Plagiarized or falsified content—whether produced by a human or GenAI—will be treated as an honor code violation.
