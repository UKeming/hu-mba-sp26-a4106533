                    - generic [ref=e103]:
                      - paragraph [ref=e104]:
                        - strong [ref=e105]: ABOUT MBA392
                      - paragraph [ref=e106]: The MBA392 CPT Practicum course is designed to provide you with the opportunity to explore and develop the connections between what you learn in the classroom and what you do at your place of work.
                      - paragraph [ref=e107]: As you go through your courses this term, each week you should write down your thoughts about how the course material connects to your work and how your work connects to the course material. Please don’t wait until the end of this term to begin your CPT Practicum Integration Papers, as late papers WILL NOT be accepted.
                      - paragraph [ref=e108]:
                        - strong [ref=e109]: HOW TO PASS MBA392
                      - paragraph [ref=e110]: "Please note the following requirements, which will ensure you Pass MBA392:"
                      - list [ref=e111]:
                        - listitem [ref=e112]: You must submit one paper per course you are enrolled in.
                        - listitem [ref=e113]: Each paper should be a minimum of 4.5 pages of content (i.e., excluding the cover page and reference page).
                        - listitem [ref=e114]: Each paper must be formatted according to the template (see below).
                        - listitem [ref=e115]: Each paper must be original content that is not plagiarized, AI generated, etc.
                        - listitem [ref=e116]: "You must provide Parts #1 and #2 (see below) in each paper you submit."
                        - listitem [ref=e117]: You must submit your work on time.
                        - listitem [ref=e118]: You must submit your work in a .doc or .docx file. Do not submit a PDF file or other file types.
                        - listitem [ref=e119]: "You must label your paper using this format: LastName.Class.PaperX (e.g., Claus.MBA320.Paper1)."
                      - paragraph
                      - paragraph [ref=e120]:
                        - strong [ref=e121]: REQUIRED NUMBER OF PAPERS
                      - paragraph [ref=e122]: If you are enrolled in TWO courses, you need to submit ONE paper per course. Therefore, a total of TWO PAPERS need to be submitted.
                      - paragraph [ref=e123]: If you are enrolled in only ONE course, you need to submit ONE paper total.
                      - paragraph [ref=e124]: If you are enrolled in MBA385, you only need to submit ONE paper by the deadline provided.
                      - paragraph [ref=e125]:
                        - strong [ref=e126]: EXPECTATIONS
                      - paragraph [ref=e127]: Provide a cover page with all APA information.
                      - paragraph [ref=e128]: "Provide 4.5+ pages of content (not including the cover page or reference page) detailing information about Parts #1 and #2."
                      - paragraph [ref=e129]: "Part #1: In about 0.5 to 1 pages, please describe the company where you work and what you do there. What does the company do? What is its business? Also, describe what kind of work you do for that company. Please note that Part #1 can be reused from past versions of MBA392."
                      - paragraph [ref=e130]: "Part #2: Write the remainder of your paper (4 to 4.5 pages) about one or both of the following: Provide details about how the course content relates to what you do at your company, and/or provide details about how the course content relates to the business of the company. If you do not think the course content relates directly to what you do, that is fine. Then, please write about how the content relates to your company. If you are not sure how the course relates to your company, ask some people at work; use it as an opportunity to talk to some leaders at your company. Be sure to identify specific chapters from the text or videos from the course site."
                      - paragraph [ref=e131]: Provide a reference page, which is formatted according to APA standards. You need to include in-text citations and references.
                      - paragraph
                      - paragraph [ref=e132]:
                        - strong [ref=e133]: DEADLINES
                      - paragraph [ref=e134]: As you will see in the syllabi for all other MBA courses, there is a late policy. Please note that this late policy DOES NOT apply to MBA392. Therefore, you must adhere to the deadlines below.
                      - list [ref=e135]:
                        - listitem [ref=e136]: "Paper #1 (Due April 26, 2026 at 11:59 PM PST)"
                        - listitem [ref=e137]: "Paper #2 (Due May 10, 2026 at 11:59 PM PST)"
                      - paragraph
                      - paragraph [ref=e138]:
                        - strong [ref=e139]: NO GRACE PERIOD... PLEASE READ!
                      - paragraph [ref=e140]: "Each term, I receive messages stating, “How can I submit work for my course because we are less than halfway through the term?” Many times, students are not certain how to proceed in terms of submitting work. Last term (as well as the term before), I received many messages stating that papers were due at the end of the term. Students mentioned that it was too difficult to submit papers by the deadlines set forth… Please note that neither of those reasons are excuses for missing the deadlines. You now know the deadlines and, thus, you now know that papers need to be submitted by April 26, 2026 at 11:59 PM PST (Paper #1) and Paper #2 is due on May 10, 2026 at 11:59 PM PST."
                      - paragraph [ref=e141]: In terms of paper content, you need to follow the template. Here’s an example of how a student, only a few weeks into this term, could write about a topic.
                      - paragraph [ref=e142]: Pretend you’re taking a class about leadership. During Weeks 1 to 3, you learned about various leadership styles. One of the styles explored might have been servant leadership. Based upon that specific leadership style, you could provide information about why servant leadership is important to you and, too, what you have witnessed in the workplace when a servant leadership approach is used versus when this approach is not used. Your experiences, reflections, material understanding, etc. should help you to create a strong paper.
                      - paragraph [ref=e143]:
                        - strong [ref=e144]: OTHER IMPORTANT PIECES OF INFORMATION
                      - paragraph [ref=e145]: MBA392 is not calculated in your cumulative grade point average (GPA).
                      - paragraph [ref=e146]: If you are not currently employed, you will receive a “No Credit” grade for MBA392.
                      - paragraph [ref=e147]: Your “No Credit” grade is not calculated into your cumulative grade point average (GPA). Furthermore, there are no units of credit for MBA392. Once you obtain employment, please make sure it is approved by the DSO.
                      - paragraph [ref=e148]: If you do not pass MBA392, this will NOT impact your academic record. If you do not pass MBA392, you will receive a “No Credit” grade. No Credit grades in MBA392 are assigned because (1) submissions are not made in a timely manner, (2) the work does not meet the expectations set forth, (3) the assignment is not aligned with the specific course, etc.
                      - paragraph [ref=e149]: If you receive a “Not Satisfactory” score, on either paper, you will receive a “No Credit” grade.
                      - paragraph [ref=e150]: If you receive a “Satisfactory” or “Outstanding” score on both papers, you will receive a Credit grade.
